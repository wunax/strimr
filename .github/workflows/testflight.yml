name: Deploy to TestFlight

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to deploy
        required: true
        default: all
        type: choice
        options:
          - all
          - ios
          - tvos

permissions:
  contents: read

concurrency:
  group: testflight-deployment
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: macos-26
    timeout-minutes: 45
    env:
      APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
      APP_STORE_CONNECT_API_KEY_PATH: ${{ runner.temp }}/AuthKey.p8
      FASTLANE_APP_IDENTIFIER: ${{ secrets.FASTLANE_APP_IDENTIFIER }}
      FASTLANE_TEAM_ID: ${{ secrets.FASTLANE_TEAM_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"
          bundler-cache: true

      - name: Install Carthage
        run: brew install carthage

      - name: Bootstrap Carthage dependencies
        run: carthage bootstrap --use-xcframeworks --platform iOS,tvOS

      - name: Restore private configuration
        env:
          CONFIG_XCCONFIG_BASE64: ${{ secrets.CONFIG_XCCONFIG_BASE64 }}
          CONFIG_TOPSHELF_XCCONFIG_BASE64: ${{ secrets.CONFIG_TOPSHELF_XCCONFIG_BASE64 }}
        run: |
          printf '%s' "$CONFIG_XCCONFIG_BASE64" | /usr/bin/base64 -D > Config/Config.xcconfig
          printf '%s' "$CONFIG_TOPSHELF_XCCONFIG_BASE64" | /usr/bin/base64 -D > Config/Config-TopShelf.xcconfig
          printf 'app_identifier("%s")\nteam_id("%s")\n' "$FASTLANE_APP_IDENTIFIER" "$FASTLANE_TEAM_ID" > fastlane/Appfile
          printf '%s' "$APP_STORE_CONNECT_API_KEY_CONTENT" | /usr/bin/base64 -D > "$APP_STORE_CONNECT_API_KEY_PATH"
          chmod 600 "$APP_STORE_CONNECT_API_KEY_PATH"

      - name: Deploy iOS and tvOS
        if: inputs.platform == 'all'
        run: bundle exec fastlane ios beta

      - name: Deploy iOS
        if: inputs.platform == 'ios'
        run: bundle exec fastlane ios ios_beta

      - name: Deploy tvOS
        if: inputs.platform == 'tvos'
        run: bundle exec fastlane ios tvos_beta
